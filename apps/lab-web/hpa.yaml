apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lab-web
  namespace: lab-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lab-web
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
