apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lab-web
  namespace: lab-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lab-web
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
