apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-web-html
  namespace: lab-web
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Andrew's Kubernetes GitOps Lab</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          background-color: #0f172a;
          color: #e5e7eb;
          text-align: center;
          padding-top: 80px;
        }
        .card {
          background-color: #1e293b;
          border-radius: 12px;
          padding: 30px;
          width: 70%;
          margin: auto;
          box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }
        h1 {
          color: #38bdf8;
        }
        p {
          font-size: 18px;
        }
        .status {
          color: #22c55e;
          font-weight: bold;
        }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>Andrew's Kubernetes GitOps Lab</h1>
        <p class="status">Deployed successfully through Argo CD</p>
        <p>This page is served by Nginx running inside Kubernetes.</p>
        <p>The application is mannaged from GitHub using GitOps.</p>
        <p>Traffic path: GitHub → Argo CD → Kubernetes → Traefik → MetalLB → Browser</p>
      </div>
    </body>
    </html>
